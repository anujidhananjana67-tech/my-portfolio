<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skills | Anuji Dhananjana</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- JavaScript එකෙන් dynamic ලෙස මෙතනට sidebar එක load වේ -->
  <aside class="sidebar"></aside>

  <!-- Main Content Area -->
  <main>
    <section id="skills" class="skills-section section active">
      <h2 class="section-title">Skills</h2>
      <div class="divider"></div>
      
      <div class="skills-grid">
        <!-- Category 1: Tech & Web -->
        <div class="skills-card">
          <div class="skills-icon"><i class="fa-solid fa-code"></i></div>
          <h3>Programming & Web</h3>
          <p>Java, HTML5, CSS3, JavaScript, MySQL</p>
        </div>

        <!-- Category 2: Tools & Platforms -->
        <div class="skills-card">
          <div class="skills-icon"><i class="fa-solid fa-toolbox"></i></div>
          <h3>Tools & Platforms</h3>
          <p>Git, GitHub, VS Code</p>
        </div>
      </div>

      <!-- Progress bar එක පිළිවෙලකට section එක ඇතුළටම ගත්තා -->
      <div class="skill-progress-bar">
        <div class="skill-name">Java <span class="percentage">80%</span></div>
        <div class="progress-line" style="--width: 80%;"></div>
      </div>
    </section>
  </main>
  
  <!-- Script එක body එක ඇතුළේ අන්තිමටම තිබිය යුතුයි -->
  <script src="script.js"></script>
</body>
</html>
