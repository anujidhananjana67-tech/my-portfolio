name: Deploy Portfolio Website

# Trigger the workflow on push to the main branch
on:
  push:
    branches:
      - main  # ඔයාගේ main branch එකේ නම 'master' නම් මේක master කරන්න

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-level: 20 # ඔයා පාවිච්චි කරන Node version එක දෙන්න
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Build the project
      - name: Build Project
        run: npm run build
        env:
          CI: false # Build warnings නිසා deploy එක fail වෙන එක නවත්වන්න

      # Step 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist 
          branch: gh-pages # Deploy වෙන static files store වෙන branch එක
